<aside class="sidebar" [class.collapsed]="!sidebarOpen">

  <div class="sidebar-header">
    <button type="button" class="toggle-btn" (click)="toggleSidebar()">
      ☰
    </button>

    <span class="brand" *ngIf="sidebarOpen">SaludYa</span>
  </div>

  <nav class="sidebar-menu">

    <a
      class="menu-item"
      routerLink="/home/perfil"
      routerLinkActive="active">
      <span class="icon">👤</span>
      <span *ngIf="sidebarOpen">Perfil</span>
    </a>

    <a
      class="menu-item"
      routerLink="/home/agendar"
      routerLinkActive="active">
      <span class="icon">📅</span>
      <span *ngIf="sidebarOpen">Agendar cita</span>
    </a>

    <a
      class="menu-item"
      routerLink="/home/citas"
      routerLinkActive="active">
      <span class="icon">🗓️</span>
      <span *ngIf="sidebarOpen">Mis citas</span>
    </a>

  </nav>

  <button type="button" class="logout-btn" (click)="logout()">
    <span class="icon">↪</span>
    <span *ngIf="sidebarOpen">Salir</span>
  </button>

</aside>
