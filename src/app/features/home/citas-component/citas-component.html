<section class="appointments-card">
  <div class="appointments-header">
    <div>
      <h2>Mis citas</h2>
      <p>Consulta el historial y estado de tus citas médicas.</p>
    </div>
  </div>

  <div class="appointments-list">
    <div class="appointment-item" *ngFor="let cita of citas">
      <div class="date-box">
        <span class="day">{{ cita.fecha | date:'dd' }}</span>
        <span class="month">{{ cita.fecha | date:'MMM' }}</span>
      </div>

      <div class="appointment-info">
        <h4>{{ cita.especialidad }}</h4>
        <p>{{ cita.fecha }} · {{ cita.hora }}</p>
        <small>{{ cita.medico }} · {{ cita.sede }}</small>
      </div>

      <span
        class="status"
        [ngClass]="{
          'completed': cita.estado === 'Completada',
          'pending': cita.estado === 'Pendiente',
          'cancelled': cita.estado === 'Cancelada'
        }">
        {{ cita.estado }}
      </span>

      <button class="btn-detail">
        Ver detalle
      </button>
    </div>
  </div>
</section>
