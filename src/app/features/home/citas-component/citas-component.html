<div class="container">
    <h3>Historial de citas</h3>

    <div class="mt-3">
        <div class="card mb-3 shadow-sm border-0" *ngFor="let cita of citas">

            <div class="card-body d-flex justify-content-between align-items-center">

                <!-- Info -->
                <div>
                    <h5 class="mb-1">{{ cita.especialidad }}</h5>
                    <p class="mb-1 text-muted">
                        {{ cita.fecha }} - {{ cita.hora }}
                    </p>
                    <small class="text-muted">
                        {{ cita.medico }} | {{ cita.sede }}
                    </small>
                </div>

                <!-- Estado -->
                <div class="text-end">
                    <span class="badge mb-2" [ngClass]="{
          'bg-success': cita.estado === 'Completada',
          'bg-warning text-dark': cita.estado === 'Pendiente',
          'bg-danger': cita.estado === 'Cancelada'
        }">
                        {{ cita.estado }}
                    </span>

                    <div>
                        <button class="btn btn-sm btn-outline-primary">
                            Ver detalle
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>
