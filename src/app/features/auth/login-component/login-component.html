<div class="login-card">
  <h2>Iniciar sesión</h2>

  <form (ngSubmit)="login()">
    <div class="mb-3">
      <input
        class="form-control"
        type="email"
        placeholder="Correo electrónico"
        [(ngModel)]="email"
        name="email">
    </div>

    <div class="mb-3">
      <input
        class="form-control"
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password"
        name="password">
    </div>

    @if (errorMessage !== '') {
      <div class="alert-error" style="color: red; background-color: #fee2e2; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-weight: 500;">
        ⚠️ {{ errorMessage }}
      </div>
    }

    <button class="btn-login" type="submit">
      Entrar
    </button>
  </form>

  <p class="register-text">
    ¿No tienes cuenta?
    <a routerLink="/register">Regístrate</a>
  </p>
</div>
