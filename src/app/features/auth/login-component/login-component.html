<div class="login-card">
  <h2>Iniciar sesión</h2>

  <form (ngSubmit)="login()">
    <div class="mb-3">
      <input
        class="form-control"
        type="email"
        placeholder="Correo electrónico"
        [(ngModel)]="email"
        name="email">
    </div>

    <div class="mb-3">
      <input
        class="form-control"
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password"
        name="password">
    </div>

    <button class="btn-login" type="submit">
      Entrar
    </button>
  </form>

  <p class="register-text">
    ¿No tienes cuenta?
    <a routerLink="/register">Regístrate</a>
  </p>
</div>
