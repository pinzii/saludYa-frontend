<div class="register-card">
  <h2>Crear cuenta</h2>

  <form (ngSubmit)="registrar()">

    <div class="mb-3">
      <input class="form-control" type="text" placeholder="Nombre completo" [(ngModel)]="form.nombre" name="nombre">
    </div>

    <div class="mb-3">
      <input class="form-control" type="email" placeholder="Correo electrónico" [(ngModel)]="form.email" name="email">
    </div>

    <div class="mb-3">
      <input class="form-control" type="password" placeholder="Contraseña" [(ngModel)]="form.password" name="password">
    </div>

    <button class="btn-register" type="submit">
      Crear cuenta
    </button>
  </form>

  <p class="login-text">
    ¿Ya tienes cuenta?
    <a routerLink="/login">Inicia sesión</a>
  </p>
</div>
